title: Marjorie Bagley, Violinist
author:
  name: Ian Beatty
  email: ian@ianbeatty.com

description: >-
  Marjorie Bagley — violinist: Professor of Violin at UNC Greensboro and
  Concertmaster of the Greensboro Symphony Orchestra.

# Build settings

# Hand-rolled templates (no theme): _layouts/default|home|page.html,
# _includes/event-*.html + season-archive.html, assets/css/main.css (plain
# CSS, no Sass), self-hosted fonts in assets/fonts/. See _RedesignPlan.md.

plugins:
  - jekyll-seo-tag

# Concert events live in _events/ as one file per event (see _RedesignPlan.md).
# Each has front matter: title, date (concert date), series, role?, venue?, url?
# and an optional blurb as the body. Templates split upcoming/past on the date,
# so old events age out automatically at build time; a weekly scheduled build
# in .github/workflows/jekyll.yml keeps that split fresh between pushes.
collections:
  events:
    output: false

# Pages shown in the header nav, in order. A page's nav_title (if set)
# overrides its title in the nav.
header_pages:
  - index.md
  - bio.md
  - studying.md
  - events.md

# Footer social links.
socials:
  - { label: Facebook,  url: "https://www.facebook.com/marjorie.bagley" }
  - { label: Instagram, url: "https://www.instagram.com/marjoriebagley" }
  - { label: LinkedIn,  url: "https://www.linkedin.com/in/marjorie-bagley-87062078/" }

# Keep repo plumbing out of the built site. (Underscore-prefixed files are
# already excluded by Jekyll; these are the rest.)
exclude:
  - CLAUDE.md
  - Makefile
  - README.md
  - readme_banner.svg
  - script/
  - scripts/
  - vendor/
  - Gemfile
  - Gemfile.lock
