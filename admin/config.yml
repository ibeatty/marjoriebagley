# Sveltia CMS configuration (Decap-compatible).
# Edited content is committed straight to the GitHub repo; the site rebuilds
# and deploys automatically. Setup instructions: _SetupSveltia.md (repo root).

backend:
  name: github
  repo: ibeatty/marjoriebagley
  branch: main
  # URL of the deployed sveltia-cms-auth Cloudflare Worker (see _SetupSveltia.md).
  base_url: https://sveltia-cms-auth.ian-8b3.workers.dev

site_url: https://ibeatty.github.io/marjoriebagley
display_url: https://ibeatty.github.io/marjoriebagley

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: events
    label: Concerts & Events
    label_singular: Event
    folder: _events
    create: true
    delete: true
    slug: "{{fields.date}}-{{slug}}"
    summary: "{{fields.date}} — {{fields.title}}"
    sort_by: date
    sortable_fields: [date, title, series]
    view_groups:
      - label: Series
        field: series
    fields:
      - name: title
        label: Title
        widget: string
        hint: "Concert name without the series prefix — e.g. “Orchestral Fireworks!”"
      - name: date
        label: Concert date
        widget: datetime
        type: date            # Sveltia: date-only picker (the old `date` widget is gone)
        time_format: false    # Decap-compat, in case we ever swap back
        format: YYYY-MM-DD
        hint: The date of the performance (not today's date).
      - name: series
        label: Series
        widget: select
        options:
          - GSO Masterworks
          - GSO Pops
          - GSO Chamber
          - GSO
          - Chamber music
          - UNCG
          - Other
        default: GSO Masterworks
      - name: role
        label: Marjorie's role
        widget: select
        options: [Soloist, Concertmaster, Chamber musician, Guest artist]
        required: false
        hint: Only when worth highlighting (e.g. Soloist). Leave empty for ordinary concertmaster duty.
      - name: venue
        label: Venue
        widget: string
        required: false
        default: Tanger Center, Greensboro NC
      - name: url
        label: Event link
        widget: string
        required: false
        hint: Ticket or details page on the presenter's website.
      - name: body
        label: Blurb
        widget: markdown
        required: false
        hint: One to three sentences about the program and guests.

  - name: pages
    label: Site Pages
    files:
      - name: home
        label: Home page intro
        file: index.md
        fields:
          - { name: layout, widget: hidden, default: home }
          - { name: title, label: Page title, widget: string }
          - name: body
            label: Intro text
            widget: markdown
            hint: Appears between the banner and the upcoming-appearances list.
      - name: bio
        label: Biographical sketch
        file: bio.md
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: title, label: Page title, widget: string }
          - { name: nav_title, widget: hidden, default: Bio }
          - { name: permalink, widget: hidden, default: /bio/ }
          - { name: body, label: Bio text, widget: markdown }
      - name: studying
        label: Studying with Marjorie
        file: studying.md
        fields:
          - { name: layout, widget: hidden, default: page }
          - { name: title, label: Page title, widget: string }
          - { name: nav_title, widget: hidden, default: Studying }
          - { name: permalink, widget: hidden, default: /studying/ }
          - { name: body, label: Page text, widget: markdown }
